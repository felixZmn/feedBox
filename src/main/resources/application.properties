quarkus.oidc.enabled=false

quarkus.smallrye-jwt.enabled=true
mp.jwt.verify.publickey.location=
mp.jwt.verify.issuer=NONE

sso.clientid=
sso.redirectUri=
sso.authServerUrl=
sso.endSessionEndpoint=

quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/postgres?password=password&user=user
quarkus.datasource.jdbc.max-size=16

# Flyway: manage the schema from versioned migrations in src/main/resources/db/migration.
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.baseline-version=0
quarkus.flyway.locations=classpath:db/migration

# HTTP Service Configuration
app.http.user-agent=FeedBox/${quarkus.application.version}
app.http.timeout=30
# scheduler config
refresh.job.interval=1h
# max number of feeds refreshed in parallel (virtual threads + bounded concurrency)
refresh.concurrency=10
quarkus.native.additional-build-args=--initialize-at-run-time=com.apptasticsoftware.rssreader.AbstractRssReader
