# Test profile overrides.
# The existing test suite is pure Mockito unit tests; there is no @QuarkusTest,
# no Testcontainers, and no in-memory database. Disable Flyway's at-start
# migration so tests don't try to connect to a database.
# If/when integration tests are added (Testcontainers PostgreSQL), remove this
# override and let Flyway build the schema from src/main/resources/db/migration.
%test.quarkus.flyway.migrate-at-start=false
