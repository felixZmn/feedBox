<!DOCTYPE html>
<html lang=en>
<head>
    <title>Test feed:// and feed:https:// link schemes</title>
    <meta charset=UTF-8>
    <!-- legacy feed:// scheme (equivalent to https://) -->
    <link href=feed://bjango.com/rss/articles.xml rel=alternate title="Bjango Articles RSS" type=application/rss+xml>
    <!-- feed:https:// variant -->
    <link href="feed:https://example.com/rss/feed.xml" rel="alternate" title="Example Feed" type="application/rss+xml">
</head>
<body><p>Test page</p></body>
</html>
